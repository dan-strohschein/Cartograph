name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./internal/graph/ ./internal/loader/ ./internal/query/
      - run: go vet ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          SUFFIX="${GOOS}-${GOARCH}"
          mkdir -p dist

          go build -ldflags="-s -w" -o "dist/cartograph-${SUFFIX}${EXT}" ./cmd/cartograph

          cd dist
          if [ "$GOOS" = "windows" ]; then
            zip "cartograph-${SUFFIX}.zip" "cartograph-${SUFFIX}${EXT}"
          else
            tar czf "cartograph-${SUFFIX}.tar.gz" "cartograph-${SUFFIX}${EXT}"
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cartograph-*.tar.gz
            dist/cartograph-*.zip
